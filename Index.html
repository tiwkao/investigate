<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Chakra Petch', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
    }
    .input-field {
      background: rgba(15, 23, 42, 0.9);
      border: 2px solid #334155;
      color: #38bdf8;
      transition: all 0.3s;
    }
    .input-field:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
      outline: none;
    }
    .result-box { background: rgba(56, 189, 248, 0.1); border: 1px dashed #38bdf8; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full glass-card shadow-2xl p-6 space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-sky-400 tracking-tight">DTAC 4G CONVERTER</h1>
      <p class="text-slate-400 text-sm">แปลงค่าจาก CDR ไปเดินเบส</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase">กรอก LAC</label>
        <input type="number" id="lacInput" placeholder="เช่น 1174" class="input-field w-full py-3 px-4 rounded-xl text-center text-xl font-bold" oninput="calculate()">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase">กรอก CI</label>
        <input type="number" id="ciInput" placeholder="เช่น 10529" class="input-field w-full py-3 px-4 rounded-xl text-center text-xl font-bold" oninput="calculate()">
      </div>
    </div>

    <div class="space-y-2 py-4 border-y border-slate-700">
      <div class="flex justify-between text-xs">
        <span class="text-slate-500">Hex Combined:</span>
        <span id="hexProcess" class="font-mono text-amber-400">-</span>
      </div>
      <div class="flex justify-between text-xs">
        <span class="text-slate-500">Split (Front 5 / End):</span>
        <span id="splitProcess" class="font-mono text-amber-400">-</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="result-box rounded-2xl p-3 text-center">
        <p class="text-[10px] text-sky-400 font-bold uppercase">eNB</p>
        <div id="enbRes" class="text-2xl font-bold text-white">-</div>
      </div>
      <div class="result-box rounded-2xl p-3 text-center">
        <p class="text-[10px] text-sky-400 font-bold uppercase">CID</p>
        <div id="cidRes" class="text-2xl font-bold text-white">-</div>
      </div>
    </div>

    <div class="bg-gradient-to-r from-sky-600 to-blue-700 rounded-2xl p-4 shadow-lg">
      <p class="text-center text-sky-100 text-xs font-bold uppercase mb-1">ECI RESULT</p>
      <div id="eciRes" class="text-center text-4xl font-bold text-white tracking-wider">-</div>
    </div>

    <div class="text-[10px] text-slate-500 text-center leading-relaxed">
      Logic: DEC2HEX(LAC+CI) → Combined → Split 5 → HEX2DEC → eNB*256+CID
    </div>
  </div>

  <script>
    function calculate() {
      const lac = document.getElementById('lacInput').value;
      const ci = document.getElementById('ciInput').value;
      
      const hexProc = document.getElementById('hexProcess');
      const splitProc = document.getElementById('splitProcess');
      const enbRes = document.getElementById('enbRes');
      const cidRes = document.getElementById('cidRes');
      const eciRes = document.getElementById('eciRes');

      if (lac && ci) {
        // 1 & 2. แปลงฐาน 10 เป็น 16 (DEC2HEX)
        const hexLac = parseInt(lac).toString(16).toUpperCase();
        const hexCi = parseInt(ci).toString(16).toUpperCase();

        // 3. นำค่ามาต่อกัน (CONCATENATE)
        const combined = hexLac + hexCi;
        hexProc.innerText = combined;

        // 4. แบ่งหน้า 5 ตัว และที่เหลือ
        const front5 = combined.substring(0, 5);
        const backRemaining = combined.substring(5);
        splitProc.innerText = front5 + " | " + backRemaining;

        // 5. แปลงฐาน 16 เป็น 10 (HEX2DEC)
        const enb = parseInt(front5, 16);
        const cid = parseInt(backRemaining, 16);

        // 6. คำนวณ ECI: (eNB * 256) + CID
        const eci = (enb * 256) + cid;

        // แสดงผลลัพธ์ (ไม่มีเครื่องหมาย , ตามที่ขอ)
        enbRes.innerText = enb;
        cidRes.innerText = cid;
        eciRes.innerText = eci;
      } else {
        hexProc.innerText = "-";
        splitProc.innerText = "-";
        enbRes.innerText = "-";
        cidRes.innerText = "-";
        eciRes.innerText = "-";
      }
    }
  </script>
</body>
</html>
