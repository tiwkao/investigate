<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Chakra Petch', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input-field {
      background: rgba(15, 23, 42, 0.9);
      border: 2px solid #334155;
      color: #38bdf8;
      transition: all 0.3s;
      /* ปรับให้กดในมือถือง่ายขึ้น */
      appearance: none; 
    }
    .input-field:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
      outline: none;
    }
    .result-box { background: rgba(56, 189, 248, 0.1); border: 1px dashed #38bdf8; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <div class="w-full sm:max-w-[500px] min-h-screen sm:min-h-fit glass-card sm:rounded-3xl shadow-2xl p-6 flex flex-col justify-center space-y-8">
    
    <div class="text-center">
      <h1 class="text-3xl font-bold text-sky-400 tracking-tight">DTAC 4G CONVERTER</h1>
      <p class="text-slate-400 text-sm">แปลงค่าจาก CDR ไปเดินเบส</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase">กรอก LAC</label>
        <input type="number" id="lacInput" inputmode="numeric" placeholder="1174" class="input-field w-full py-4 px-4 rounded-2xl text-center text-2xl font-bold" oninput="calculate()">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase">กรอก CI</label>
        <input type="number" id="ciInput" inputmode="numeric" placeholder="10529" class="input-field w-full py-4 px-4 rounded-2xl text-center text-2xl font-bold" oninput="calculate()">
      </div>
    </div>

    <div class="space-y-3 py-6 border-y border-slate-700/50">
      <div class="flex justify-between items-center text-sm">
        <span class="text-slate-500">Hex Combined:</span>
        <span id="hexProcess" class="font-mono text-amber-400 font-bold">-</span>
      </div>
      <div class="flex justify-between items-center text-sm">
        <span class="text-slate-500">Split (Front 5 | End):</span>
        <span id="splitProcess" class="font-mono text-amber-400 font-bold">-</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="result-box rounded-2xl py-4 text-center">
        <p class="text-xs text-sky-400 font-bold uppercase mb-1">eNB</p>
        <div id="enbRes" class="text-3xl font-bold text-white">-</div>
      </div>
      <div class="result-box rounded-2xl py-4 text-center">
        <p class="text-xs text-sky-400 font-bold uppercase mb-1">CID</p>
        <div id="cidRes" class="text-3xl font-bold text-white">-</div>
      </div>
    </div>

    <div class="bg-gradient-to-br from-sky-500 to-blue-700 rounded-3xl p-6 shadow-xl shadow-blue-900/20">
      <p class="text-center text-sky-100 text-xs font-bold uppercase mb-2 tracking-widest">ECI RESULT</p>
      <div id="eciRes" class="text-center text-5xl font-bold text-white tracking-tighter">-</div>
    </div>

    <div class="text-[11px] text-slate-500 text-center leading-relaxed opacity-60 italic">
      Logic: DEC2HEX(LAC+CI) → Combined → Split 5 → HEX2DEC → eNB*256+CID
    </div>
  </div>

  <script>
    function calculate() {
      const lac = document.getElementById('lacInput').value;
      const ci = document.getElementById('ciInput').value;
      
      const hexProc = document.getElementById('hexProcess');
      const splitProc = document.getElementById('splitProcess');
      const enbRes = document.getElementById('enbRes');
      const cidRes = document.getElementById('cidRes');
      const eciRes = document.getElementById('eciRes');

      if (lac && ci) {
        const hexLac = parseInt(lac).toString(16).toUpperCase();
        const hexCi = parseInt(ci).toString(16).toUpperCase();
        const combined = hexLac + hexCi;
        hexProc.innerText = combined;

        const front5 = combined.substring(0, 5);
        const backRemaining = combined.substring(5);
        splitProc.innerText = front5 + " | " + backRemaining;

        const enb = parseInt(front5, 16);
        const cid = parseInt(backRemaining, 16);
        const eci = (enb * 256) + cid;

        enbRes.innerText = enb;
        cidRes.innerText = cid;
        eciRes.innerText = eci;
      } else {
        hexProc.innerText = "-";
        splitProc.innerText = "-";
        enbRes.innerText = "-";
        cidRes.innerText = "-";
        eciRes.innerText = "-";
      }
    }
  </script>
</body>
</html>
