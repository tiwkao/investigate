<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="glass w-full max-w-lg rounded-[2.5rem] shadow-2xl p-8 md:p-12 text-center text-white">
    <div class="mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-500/20 rounded-3xl mb-4 text-blue-400">
        <i class="fa-solid fa-tower-broadcast text-4xl"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight">Converter <span class="text-blue-400">Pro</span></h1>
      <p class="text-slate-400 mt-2 text-sm">แปลงไฟล์สัญญาณให้พร้อมลงแผนที่ทันที</p>
    </div>

    <div class="space-y-6 text-left">
      <div>
        <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 ml-1">ชื่อไฟล์ขาออก</label>
        <input type="text" id="fileName" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600" placeholder="ระบุชื่อไฟล์ (เช่น บ้านปรัชญาภรณ์)">
      </div>

      <div class="relative group">
        <input type="file" id="csvInput" class="hidden" accept=".csv" onchange="updateFileLabel()">
        <label for="csvInput" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-700 rounded-3xl cursor-pointer hover:border-blue-500 hover:bg-blue-500/5 transition-all">
          <i class="fa-solid fa-file-csv text-3xl text-slate-500 mb-2 group-hover:text-blue-400"></i>
          <span id="fileLabel" class="text-sm text-slate-500">เลือกไฟล์ CSV (ใช้ตัวคั่น ;)</span>
        </label>
      </div>

      <button onclick="startProcess()" id="mainBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/20 transition-all flex items-center justify-center gap-3 active:scale-95">
        <i class="fa-solid fa-bolt"></i> เริ่มแปลงข้อมูล
      </button>
    </div>

    <div id="loader" class="hidden mt-6 flex items-center justify-center gap-3 text-blue-400">
      <svg class="animate-spin h-5 w-5 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      <span>กำลังประมวลผล...</span>
    </div>

    <div id="downloadSection" class="hidden mt-8 animate-bounce">
      <button onclick="downloadFile()" class="w-full bg-emerald-500 hover:bg-emerald-400 py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
        <i class="fa-solid fa-download"></i> ดาวน์โหลด CSV ได้เลย
      </button>
    </div>
  </div>

  <script>
    let resultData = null;

    function updateFileLabel() {
      const file = document.getElementById('csvInput').files[0];
      if (file) document.getElementById('fileLabel').innerText = file.name;
    }

    /* แก้ไขเฉพาะฟังก์ชัน startProcess ในส่วน Script ของ Index.html เดิม */

let userProfile = null; // ตัวแปรเก็บค่าโปรไฟล์

// ฟังก์ชันดึงโปรไฟล์จาก LIFF (เรียกใช้ตอน init)
function getUserProfile() {
  liff.getProfile().then(profile => {
    userProfile = profile; // เก็บค่าไว้ใช้ตอนกดปุ่มแปลงไฟล์
    document.getElementById('profileHeader').classList.remove('hidden');
    document.getElementById('userImg').src = profile.pictureUrl;
    document.getElementById('userName').innerText = profile.displayName;
    document.getElementById('userId').innerText = profile.userId;
  });
}

function startProcess() {
  const fileInput = document.getElementById('csvInput');
  const file = fileInput.files[0];
  const customName = document.getElementById('fileName').value;

  if (!file) return alert('กรุณาเลือกไฟล์ก่อนครับ');
  if (!userProfile) return alert('กรุณารอการโหลดโปรไฟล์ LINE สักครู่');

  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('downloadSection').classList.add('hidden');
  document.getElementById('mainBtn').disabled = true;

  const reader = new FileReader();
  reader.onload = function(e) {
    // ส่งข้อมูล 3 ส่วน: เนื้อหาไฟล์, ชื่อไฟล์ที่ตั้ง, และข้อมูล User
    google.script.run.withSuccessHandler(function(response) {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('mainBtn').disabled = false;
      
      if (response.status === 'success') {
        resultData = response.data;
        document.getElementById('downloadSection').classList.remove('hidden');
        console.log("บันทึกข้อมูลลง Sheet เรียบร้อย: " + response.count + " แถว");
      } else {
        alert(response.message);
      }
    }).processCsv(e.target.result, customName, userProfile);
  };
  reader.readAsText(file);
}

      const reader = new FileReader();
      reader.onload = function(e) {
        google.script.run.withSuccessHandler(function(response) {
          document.getElementById('loader').classList.add('hidden');
          document.getElementById('mainBtn').disabled = false;
          document.getElementById('mainBtn').classList.remove('opacity-50');
          
          if (response.status === 'success') {
            resultData = response.data;
            document.getElementById('downloadSection').classList.remove('hidden');
          } else {
            alert(response.message);
          }
        }).processCsv(e.target.result);
      };
      reader.readAsText(file);
    }

    function downloadFile() {
      if (!resultData) return;
      const name = document.getElementById('fileName').value || 'cell_map_ready';
      let csvContent = "\uFEFF"; 
      resultData.forEach(row => {
        csvContent += row.join(",") + "\r\n";
      });
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name + '.csv';
      a.click();
    }
  </script>
</body>
</html>
