<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050a18; }
    .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
    .input-field { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
    .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
    .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: transform 0.2s, box-shadow 0.2s; }
    .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); }
    .profile-badge { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

  <!-- Profile Section -->
  <div id="profileBox" class="fixed top-6 right-6 hidden animate-fade-in">
    <div class="profile-badge flex items-center gap-4 p-2 pr-5 rounded-2xl shadow-2xl">
      <img id="userImg" class="w-12 h-12 rounded-xl border border-blue-500/30 object-cover shadow-lg">
      <div class="flex flex-col">
        <span id="userName" class="text-white text-sm font-bold">Loading...</span>
        <span id="userId" class="text-slate-500 text-[9px] uppercase tracking-wider font-mono">ID: Fetching</span>
      </div>
    </div>
  </div>

  <!-- Main Card -->
  <div class="glass-card w-full max-w-lg p-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
    <div class="text-center mb-10">
      <div class="inline-flex p-4 rounded-3xl bg-blue-500/10 mb-6">
        <i class="fa-solid fa-satellite-dish text-4xl text-blue-400"></i>
      </div>
      <h1 class="text-3xl font-extrabold text-white tracking-tight">Converter <span class="text-blue-500 underline decoration-blue-500/30 underline-offset-8">Pro</span></h1>
      <p class="text-slate-400 mt-4 font-light text-sm">G-Mon Pro Data Transformation Engine</p>
    </div>

    <div class="space-y-6">
      <div class="group">
        <label class="text-[10px] uppercase font-bold text-slate-500 tracking-widest ml-1">Project Name</label>
        <input type="text" id="fileName" class="input-field w-full mt-2 p-4 rounded-2xl text-white outline-none" placeholder="เช่น บ้านปรัชญาภรณ์_เขต8">
      </div>

      <div class="relative">
        <input type="file" id="csvInput" class="hidden" accept=".csv" onchange="updateFileStatus()">
        <label for="csvInput" class="input-field flex flex-col items-center justify-center w-full h-40 rounded-3xl cursor-pointer hover:bg-white/5 border-dashed border-2 border-slate-700">
          <i id="fileIcon" class="fa-solid fa-cloud-arrow-up text-3xl text-slate-600 mb-3 transition-colors"></i>
          <span id="fileLabel" class="text-slate-400 text-sm font-medium italic">คลิกเพื่อเลือกไฟล์ CSV (;)</span>
        </label>
      </div>

      <button onclick="handleProcess()" id="btnMain" class="btn-gradient w-full py-5 rounded-2xl text-white font-bold flex items-center justify-center gap-3">
        <i class="fa-solid fa-play"></i> PROCESS NOW
      </button>
    </div>

    <!-- Status & Download -->
    <div id="loading" class="hidden mt-8 text-center animate-pulse">
      <span class="text-blue-400 text-sm italic tracking-widest uppercase">Converting...</span>
    </div>

    <div id="downloadArea" class="hidden mt-10 p-1 rounded-2xl bg-gradient-to-r from-emerald-500/20 to-teal-500/20">
      <button onclick="downloadCSV()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-5 rounded-xl transition-all flex items-center justify-center gap-3">
        <i class="fa-solid fa-file-arrow-down text-xl"></i> DOWNLOAD RESULT
      </button>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009625316-OqaeXRlz'; 
    let lineUser = null;
    let convertedRows = null;

    // Initialize LINE LIFF
    window.onload = () => {
      liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) liff.login();
        else fetchProfile();
      });
    };

    function fetchProfile() {
      liff.getProfile().then(p => {
        lineUser = p;
        document.getElementById('profileBox').classList.remove('hidden');
        document.getElementById('userImg').src = p.pictureUrl;
        document.getElementById('userName').innerText = p.displayName;
        document.getElementById('userId').innerText = p.userId.substring(0, 15) + '...';
      });
    }

    function updateFileStatus() {
      const file = document.getElementById('csvInput').files[0];
      if (file) {
        document.getElementById('fileLabel').innerText = file.name;
        document.getElementById('fileLabel').classList.replace('text-slate-400', 'text-blue-400');
        document.getElementById('fileIcon').classList.replace('text-slate-600', 'text-blue-400');
      }
    }

    function handleProcess() {
      const file = document.getElementById('csvInput').files[0];
      const name = document.getElementById('fileName').value;
      if (!file) return alert('กรุณาเลือกไฟล์!');

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('downloadArea').classList.add('hidden');
      document.getElementById('btnMain').disabled = true;

      const reader = new FileReader();
      reader.onload = (e) => {
        google.script.run.withSuccessHandler(res => {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('btnMain').disabled = false;
          if (res.status === 'success') {
            convertedRows = res.data;
            document.getElementById('downloadArea').classList.remove('hidden');
          } else { alert(res.message); }
        }).processCsv(e.target.result, name, lineUser);
      };
      reader.readAsText(file);
    }

    function downloadCSV() {
      const name = document.getElementById('fileName').value || 'Converted_Data';
      let csv = "\uFEFF" + convertedRows.map(r => r.join(",")).join("\n");
      let blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
      let a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name + '.csv';
      a.click();
    }
  </script>
</body>
</html>
